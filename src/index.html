<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="./output.css" rel="stylesheet">
</head>

<body>
    <!-- NavBar -->
    <nav class="w-full h-[120px] bg-navBar flex items-center justify-between px-10">
        <div class="w-[60px] h-[60px]">
            <img src="../assets/logo.png" alt="logo">
        </div>

        <div class="w-fit h-24 flex items-center">
            <ul class="flex items-center justify-center gap-4 text-white">
                <li>
                    <a href="">Home</a>
                </li>
                <li>
                    <a href="">Bookings</a>
                </li>
                <li><a href="">AI Trip Planner</a></li>
                <li><a href="">Wishlist</a></li>
            </ul>
        </div>

        <div class="w-[60px] h-[60px] bg-[#B8DFF2] rounded-full">
            <img src="../assets/avatarImage.png" alt="avatar">
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="w-full h-[90vh] bg-heroImage bg-cover bg-center bg-no-repeat relative">
        <img src="../assets/background.jpg" alt="background">
        <h1 class="absolute top-24 text-white text-[65px] text-center font-bold">Your Ultimate Travel Companion for
            Seamless Adventures</h1>
        <div
            class="w-[90%] h-full bg-[#002855] absolute -bottom-20 left-[50%] translate-x-[-50%] translate-y-[50%] rounded-t-[30px] px-10 flex justify-center">
            <div class="w-fit h-24 bg-white rounded-xl -mt-12 flex items-center justify-between pr-4 gap-x-12">
                <div class="w-24 h-24 flex flex-col items-center justify-center gap-2 bg-[#023E7D] rounded-xl">
                    <i class="fa fa-plane text-white text-xl -rotate-12"></i>
                    <p class="text-white text-center text-wrap">Flight</p>
                </div>
                <div class="flex flex-col items-center justify-center">
                    <i class="fas fa-snowboarding text-[#0353A4] text-2xl"></i>
                    <p class="text-[#0353A4] text-center">
                        <span>Holiday</span><br>
                        <span>Package</span>
                    </p>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <i class="fas fa-train text-[#0353A4] text-2xl"></i>
                    <p class="text-[#0353A4] text-center text-wrap">Trains</p>
                </div>
                <div class="flex flex-col items-center gap-1">
                    <i class="fas fa-route text-[#0353A4] text-2xl"></i>
                    <p class="text-[#0353A4] text-center">
                        <span>AI Trip</span><br>
                        <span>Planner</span>
                    </p>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <i class="fas fa-bus text-[#0353A4] text-2xl"></i>
                    <p class="text-[#0353A4] text-center text-wrap">Bus</p>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <i class="fas fa-car text-[#0353A4] text-2xl"></i>
                    <p class="text-[#0353A4] text-center text-wrap">Cabs</p>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <i class="fas fa-hotel text-[#0353A4] text-2xl"></i>
                    <p class="text-[#0353A4] text-center text-wrap">Hotels</p>
                </div>
            </div>
            
        </div>

</body>

</html>
